version: '3.8'

services:
  db:
    image: postgres:15
    container_name: nutrigen_db
    restart: always
    environment:
      POSTGRES_USER: nutrigen_user
      POSTGRES_PASSWORD: nutrigen_password
      POSTGRES_DB: nutrigen
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
