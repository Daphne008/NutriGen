<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriGen | Log In</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="splash-body auth-page">
    
    <div class="glass-blob blob-1"></div>
    <div class="glass-blob blob-2" style="bottom: 0; right:0;"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <span class="logo-icon">🌿</span> NutriGen
                </div>
                <h2>Welcome Back</h2>
                <p>Log in to continue your clinical simulation.</p>
            </div>

            <form class="auth-form" id="login-form">
                <div class="input-group">
                    <label for="email">Institutional Email</label>
                    <input type="email" id="email" placeholder="jane.doe@university.edu" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>

                <button type="submit" class="btn-primary" style="margin-top: 16px;">Log In</button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html" style="color:var(--accent-green); font-weight:600; text-decoration:none;">Sign Up</a></p>
                <a href="index.html" class="nav-link" style="font-size: 13px; margin-top:24px; display:inline-block;">← Return to Home</a>
            </div>
        </div>
    </div>
    <script src="auth.js"></script>
</body>
</html>
